version: '3.8'

services:
  google-maps-scraper:
    image: gosom/google-maps-scraper:latest
    container_name: google-maps-scraper
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - scraper_data:/data
    command: ["-web", "-dsn", "/data/leads.db"]
    environment:
      - PLAYWRIGHT_INSTALL_BROWSERS=1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/jobs"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  scraper_data:
    driver: local
